spring.application.name=optimization-engine

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/meridian_db
spring.datasource.username=meridian
spring.datasource.password=meridian_password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.spatial.dialect.postgis.PostgisDialect

# OR-Tools VRP Solver Weights
meridian.solver.weight.distance=1.0
meridian.solver.weight.fairness=5.0
